# ============================================================================
# NOTES ON CONFIGURATION
# ============================================================================
#
# API KEYS:
#   - Specify inline: api_key = "sk-..." (not recommended for committed files)
#   - Use environment: export OPENAI_API_KEY="sk-..." and omit api_key
#   - Both methods work; env vars take precedence
#
# MULTIPLE MODELS:
#   Define separate agent entries with different IDs, even if using same model:
#   - Different temperatures for varied behavior
#   - Different attitudes for different perspectives
#   - Different roles for different responsibilities
#
# FILE REFERENCES:
#   Use file:// for large text values:
#   - attitude = "file://./prompts/my_attitude.txt"
#   - system_prompt = "file://./prompts/system.txt" (load system prompt from file)
#
# TOPOLOGY SELECTION:
#   hub_spoke    - Most scenarios (debate, consensus, design review)
#   star         - Interrogation harness, Turing test, actor vs interrogators
#   round_robin  - Structured discussion, cost control
#   mesh         - Small groups (2-3 agents), high interactivity, high cost
#   arbiter      - Moderated discussions, filtered communication
#
# TEMPERATURE GUIDANCE:
#   0.0–0.3     - Focused, deterministic (analysts, judges)
#   0.5–0.7     - Balanced, default (most agents)
#   0.8–1.0     - Creative, varied (creative roles)
#   1.0–2.0     - Very random (exploration, brainstorming)
#
# BUDGET MANAGEMENT:
#   If tokens run high:
#   - Reduce keep_last_messages (smaller window = fewer tokens per call)
#   - Reduce max_turns_total (fewer turns)
#   - Use cheaper models (gpt-3.5 instead of gpt-4)
#   - Use limited_1 or limited_2 fanout (fewer recipients per message)
#   - Use round_robin topology (one agent per turn)
#
# LOGGING:
#   Session logs appear in: ./logs/{session_id}.log
#   Format: YYYY-MM-DD hh:mm:ss: [AGENT_ID] message
#   Tail in real-time: tail -f logs/20260304153022.log
#
