# LAN-LLM-Hub Configuration Template
#
# Copy this file to config.toml and fill in your API keys and agent settings.
# Do not commit config.toml to git (it contains secrets).
#
# For large values (attitudes, system prompts, etc.), use file:// references:
#   attitude = "file://./prompts/my_attitude.txt"
# This keeps config clean and allows reuse of prompt files.

# ============================================================================
# SESSION CONFIGURATION
# ============================================================================

[session]

# Routing Topology
# Choose how agents communicate with each other:
#   hub_spoke      - Central orchestrator (default, recommended)
#   star           - One central agent (actor), others connect only to it
#   round_robin    - Agents speak in rotation
#   mesh           - Everyone talks to everyone (high token cost)
#   arbiter_gated  - One arbiter controls routing
topology = "hub_spoke"

# Fanout Strategy (only used with hub_spoke topology)
# How many recipients get each message:
#   broadcast_except_sender - Send to all agents except sender (default)
#   broadcast_all          - Send to all agents including sender (unusual)
#   limited_1              - Send to only 1 agent per message (cost control)
#   limited_2              - Send to only 2 agents per message
fanout = "broadcast_except_sender"

# Memory Configuration
# How much history to keep per agent:
keep_last_messages = 12          # Keep last N messages verbatim (default: 12)
summarize_after_messages = 24    # Trigger summarization at this message count (default: 24)
                                 # When exceeded, old messages are summarized and discarded

# Stop Conditions / Budget Enforcement
# Session stops when ANY of these limits are reached:
max_turns_total = 100            # Stop after total N turns across all agents (default: 100)
max_minutes = 60.0               # Stop after N minutes elapsed (default: 60)
max_tokens_total = 100000        # Stop after N tokens consumed (default: 100000)

# Per-Agent Limits
max_turns_per_agent = null       # Max turns for any single agent (null = unlimited, default)
cooldown_seconds = 0.0           # Minimum seconds between consecutive calls to same agent (default: 0)

# Logging
log_dir = "./logs"               # Directory for session logs (default: ./logs)
                                 # Session logs: {session_id}.log (human-readable)
                                 # Events logs: {session_id}.events.jsonl (machine-readable, optional)

# ============================================================================
# ROUTING CONFIGURATION
# ============================================================================

[routing]

# Channel Subscriptions (Reserved for future use)
# Currently all agents are on the "main" channel
topic_default = "main"

# ============================================================================
# AGENT DEFINITIONS
# ============================================================================
#
# Each [[agents]] section defines one agent. You can define multiple agents
# with the same provider/model but different personalities.
#
# REQUIRED per agent:
#   id       - Unique agent identifier (e.g., "gpt4_analyst", "claude_mediator")
#   provider - openai, google, or anthropic
#   model    - Model name (e.g., gpt-4, claude-3-sonnet, gemini-1.5-pro)
#   api_key  - API key (or omit and use OPENAI_API_KEY, GOOGLE_API_KEY, ANTHROPIC_API_KEY env vars)
#
# OPTIONAL per agent:
#   role              - Agent role in scenario (e.g., analyst, interrogator, judge)
#   temperature       - Sampling temperature 0.0–2.0 (default: 0.7)
#   max_tokens        - Max response length in tokens (default: 2000)
#   attitude          - 1–2 sentence persona directive (use file:// for longer text)
#   system_prompt     - System prompt for this agent (inline string or file://./path/to/file.txt)
#   subscriptions     - List of channels agent subscribes to (currently unused, use ["main"])
#   private_notes     - true/false: can send private messages to judge/arbiter (default: false)

# ============================================================================
# EXAMPLE 1: Multiple Instances of Same Model (OpenAI)
# ============================================================================

[[agents]]
id = "gpt4_analyst"
provider = "openai"
model = "gpt-4"
api_key = "sk-..."                    # Or: export OPENAI_API_KEY and omit this line
temperature = 0.5                     # Lower = more focused, deterministic
max_tokens = 2000
role = "analyst"
attitude = "Analytical and data-focused. Look for patterns and evidence."
system_prompt = "You are a rigorous analyst. Demand evidence for all claims."
subscriptions = ["main"]
# private_notes = false               # This agent doesn't send private messages

[[agents]]
id = "gpt4_creative"
provider = "openai"
model = "gpt-4"
api_key = "sk-..."
temperature = 0.9                     # Higher = more creative, random
max_tokens = 2000
role = "creative"
attitude = "Creative and imaginative. Explore unconventional ideas."
system_prompt = "file://./prompts/system_creative.txt"  # Load from file
subscriptions = ["main"]

